name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript (lint · typecheck · build · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The three-way Reserved Matters invariant: yaml == policy constants == legal schedule.
      - name: Reserved Matters invariant
        run: pnpm check:reserved

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  contracts:
    name: Contracts (forge build · test, incl. adversarial)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # contracts/dependencies (OZ + forge-std) are vendored/committed, so no
        # submodule or soldeer-registry fetch is needed — forge builds offline.

      - uses: foundry-rs/foundry-toolchain@v1

      - name: forge build
        run: forge build --root contracts --sizes

      - name: forge test (adversarial safety proofs must pass)
        run: forge test --root contracts -vvv

  e2e:
    name: Scripted end-to-end agent (anvil)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # forge + anvil for the live-chain run (deploys via Deploy.s.sol, spawns anvil).
      - uses: foundry-rs/foundry-toolchain@v1

      - run: pnpm install --frozen-lockfile

      # Build the runtime packages — the harness imports the dist barrels.
      - run: pnpm build

      # Drives the REAL GovernanceCore (policy → sim → signer → broadcast) through the
      # full propose→vote→queue→execute lifecycle + bounded op + guardian veto on a
      # throwaway anvil. No external credentials (stub IPFS + anvil-fork simulator).
      - name: pnpm e2e:local (scripted end-to-end agent, 52 assertions)
        run: pnpm e2e:local
